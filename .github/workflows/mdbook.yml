name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.3'

      - name: Cache mdbook-katex
        id: cache-katex
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-katex
          key: ${{ runner.os }}-mdbook-katex-0.10.0-alpha

      - name: Install mdbook-katex
        if: steps.cache-katex.outputs.cache-hit != 'true'
        run: cargo install mdbook-katex --version 0.10.0-alpha

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with PWA support
        run: |
          # Disable preprocessor for CI build stability
          sed -i '/\[preprocessor.ingest\]/,/title_word_limit = 5/d' book.toml
          npm run build:pwa

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
